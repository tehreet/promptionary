name: preview-e2e

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_bbIji7EWthbnG135XzhFl2CNr6K7
      VERCEL_TEAM_ID: team_9PBy4biwS1zFp6lsUZBEwjMh
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      DEPLOY_TIMEOUT_SECONDS: "900"
      DEPLOY_POLL_INTERVAL: "10"
    steps:
      - name: Check VERCEL_TOKEN is set
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "✗ VERCEL_TOKEN secret is not configured. Add it under repo settings → Secrets → Actions." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for Vercel preview deploy
        id: preview
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + DEPLOY_TIMEOUT_SECONDS ))
          deploy_url=""
          deploy_state=""
          deploy_id=""

          while :; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "✗ Timed out waiting for deploy state=READY for sha=${HEAD_SHA:0:8}" >&2
              exit 1
            fi

            resp=$(curl -sS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_TEAM_ID}&meta-githubCommitSha=${HEAD_SHA}&limit=1" \
              || echo '{}')

            err=$(echo "$resp" | jq -r '.error.code // empty')
            if [ -n "$err" ]; then
              msg=$(echo "$resp" | jq -r '.error.message // ""')
              echo "✗ Vercel API error (${err}): ${msg}" >&2
              exit 1
            fi

            deploy=$(echo "$resp" | jq -c '.deployments[0] // empty')
            if [ -z "$deploy" ]; then
              echo "  no deployment yet for sha=${HEAD_SHA:0:8}, sleeping ${DEPLOY_POLL_INTERVAL}s..."
              sleep "$DEPLOY_POLL_INTERVAL"
              continue
            fi

            deploy_id=$(echo "$deploy" | jq -r .uid)
            deploy_state=$(echo "$deploy" | jq -r .state)
            deploy_url=$(echo "$deploy" | jq -r .url)

            case "$deploy_state" in
              READY)
                echo "✓ Preview READY: https://${deploy_url} (id=${deploy_id})"
                echo "url=https://${deploy_url}" >> "$GITHUB_OUTPUT"
                break
                ;;
              ERROR|CANCELED)
                echo "✗ Deploy ${deploy_id} reached terminal state ${deploy_state}" >&2
                exit 1
                ;;
              *)
                echo "  state=${deploy_state}, sleeping ${DEPLOY_POLL_INTERVAL}s..."
                sleep "$DEPLOY_POLL_INTERVAL"
                ;;
            esac
          done

      - name: Run Playwright e2e against preview
        env:
          PROMPTIONARY_TEST_URL: ${{ steps.preview.outputs.url }}
          PROMPTIONARY_MOCK_GEMINI: "1"
        run: bun test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
