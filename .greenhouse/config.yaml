version: "1"

repos:
  - owner: tehreet
    repo: promptionary
    labels:
      - agent-ready
    project_root: /home/joshf/promptionary

poll_interval_minutes: 10
daily_cap: 5

dispatch:
  capability: coordinator
  max_concurrent: 1
  monitor_interval_seconds: 30
  run_timeout_minutes: 90

shipping:
  auto_push: true
  auto_merge: true
  pr_template: |
    ## Greenhouse Auto-PR

    Closes #{github_issue_number}

    **Seeds Task:** {seeds_task_id}

    ### Summary
    {agent_summary}

    ### Quality Gates
    - [ ] Tests pass
    - [ ] Lint clean
    - [ ] Typecheck clean

    ---
    Automated by [Greenhouse](https://github.com/jayminwest/greenhouse)
